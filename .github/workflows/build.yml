name: Build XMSpeedAd
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Theos + iOS SDK
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq curl xz-utils
          git clone --recursive --depth=1 https://github.com/theos/theos.git /tmp/theos
          SDK_URL=https://github.com/theos/sdks/releases/latest/download/iPhoneOS16.5.sdk.tar.xz
          curl -sL -o /tmp/sdk.tar.xz "$SDK_URL"
          mkdir -p /tmp/theos/sdks
          tar xf /tmp/sdk.tar.xz -C /tmp/theos/sdks
          echo "THEOS=/tmp/theos" >> $GITHUB_ENV

      - name: Build with Theos
        run: make clean package

      - uses: actions/upload-artifact@v4
        with:
          name: XMSpeedAd
          path: packages/*.deb
